services:
  - type: web
    name: smart-hostel-grievance-system
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: DB_NAME
        value: smart-hostel
      - key: JWT_EXPIRY
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: http://localhost:5173
      - key: VITE_API_BASE
        value: ""
